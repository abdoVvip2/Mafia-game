<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>غرفة الانتظار - ذيب الكحلوش</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f0c040; --red: #e63030; --dark: #0d0d0d; --card: #161616; --border: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* منع التمرير العام للصفحة لضمان بقاء الهيدر والفوتر في مكانهم */
        body { background: var(--dark); color: #e8e8e0; font-family: 'Almarai', sans-serif; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر وزر القوانين */
        .room-header { padding: 12px 15px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; }
        .header-info { display: flex; flex-direction: column; gap: 4px; }
        .room-header h2 { font-size: 1.1rem; color: var(--gold); }
        .rules-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .rules-btn:active { background: var(--gold); color: #000; }

        /* شريط اللاعبين */
        .players-bar { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; background: #080808; border-bottom: 1px solid var(--border); flex-shrink: 0; scrollbar-width: none; }
        .players-bar::-webkit-scrollbar { display: none; }
        .player-node { background: var(--card); border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .player-node.is-host { border-color: var(--gold); color: var(--gold); }

        /* منطقة الدردشة (تأخذ المساحة المتبقية فقط) */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d0d0d; scroll-behavior: smooth; }
        .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 90%; }
        .bubble-wrap.mine { align-self: flex-end; align-items: flex-end; }
        .sender-name { font-size: 0.75rem; color: #888; padding: 0 4px; }
        .mine .sender-name { color: var(--gold); }
        .bubble-text { padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; background: #222; color: #eee; word-wrap: break-word; }
        .mine .bubble-text { background: var(--red); color: #fff; }

        /* منطقة الإدخال */
        .controls { padding: 12px 15px; background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; background: #222; border: 1px solid #333; color: #fff; padding: 12px 15px; border-radius: 4px; outline: none; font-size: 0.95rem; font-family: inherit; }
        .send-btn { background: var(--gold); border: none; padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; color: #000; font-family: inherit; }
        
        .btn-start { width: 100%; padding: 12px; background: var(--red); color: #fff; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; display: none; margin-top: 10px; font-family: inherit; }
        .btn-start:disabled { opacity: 0.5; }

        /* نافذة القوانين */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 1px solid var(--gold); z-index: 100; border-radius: 8px; padding: 20px; width: 90%; max-width: 350px; }
        .modal h3 { color: var(--gold); margin-bottom: 15px; text-align: center; }
        .modal p { font-size: 0.85rem; line-height: 1.6; margin-bottom: 10px; color: #ccc; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .close-btn { width: 100%; padding: 10px; background: var(--gold); color: #000; border: none; border-radius: 4px; font-weight: bold; margin-top: 10px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <header class="room-header">
        <div class="header-info">
            <h2 id="room-name">جاري التحميل...</h2>
            <div id="player-count" style="font-size: 0.75rem; color: #888;">0/0</div>
        </div>
        <button class="rules-btn" onclick="toggleRules(true)">القوانين</button>
    </header>

    <div class="players-bar" id="players-list"></div>

    <div class="chat-area" id="chat-messages">
        <div style="text-align:center; color:#444; font-size:0.8rem; margin-top:20px;">النظام: مساحة النقاش مفتوحة.</div>
    </div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="chat-input" placeholder="أدخل رسالتك...">
            <button class="send-btn" onclick="sendMessage()">إرسال</button>
        </div>
        <button class="btn-start" id="start-game-btn" onclick="startGame()">انطلاق اللعبة</button>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="toggleRules(false)"></div>
    <div class="modal" id="rules-modal">
        <h3>قوانين اللعبة</h3>
        <p>1. القتل يتم ليلاً والتصويت نهاراً.</p>
        <p>2. اللاعب الحاصل على أغلبية الأصوات يطرد.</p>
        <p>3. التواصل خارج نظام الغرفة يعرضك للحظر.</p>
        <p>4. المضيف يحق له بدء اللعبة متى ما اكتمل 4 لاعبين.</p>
        <button class="close-btn" onclick="toggleRules(false)">إغلاق</button>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
import { getDatabase, ref, onValue, set, push, serverTimestamp, update, onDisconnect } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBnCUMiGluMPhqMlaa-94xn9QLX19G7aPI",
    authDomain: "mafia-2fdd8.firebaseapp.com",
    projectId: "mafia-2fdd8",
    databaseURL: "https://mafia-2fdd8-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get('id');
let myNick = "";

onAuthStateChanged(auth, user => {
    if (user && roomId) {
        onValue(ref(db, 'users/' + user.uid), s => {
            myNick = s.val()?.username || "مجهول";
            initRoom(user.uid);
        }, { onlyOnce: true });
    }
});

function initRoom(uid) {
    const roomRef = ref(db, `rooms/${roomId}`);
    const myRef = ref(db, `rooms/${roomId}/players/${uid}`);

    set(myRef, { name: myNick, id: uid });
    onDisconnect(myRef).remove();

    onValue(roomRef, snap => {
        if (!snap.exists()) return;
        const data = snap.val();
        document.getElementById('room-name').innerText = data.name;
        
        const players = Object.values(data.players || {});
        document.getElementById('player-count').innerText = `${players.length} / ${data.max}`;

        const pList = document.getElementById('players-list');
        pList.innerHTML = players.map(p => `
            <div class="player-node ${p.id === data.hostId ? 'is-host' : ''}">
                ${p.name} ${p.id === data.hostId ? '[مضيف]' : ''}
            </div>
        `).join('');

        if (data.status === "playing") window.location.href = `game.html?id=${roomId}`;

        if (data.hostId === uid) {
            const btn = document.getElementById('start-game-btn');
            btn.style.display = 'block';
            btn.disabled = players.length < 4;
        }
    });

    onValue(ref(db, `rooms/${roomId}/chat`), snap => {
        const chatBox = document.getElementById('chat-messages');
        chatBox.innerHTML = "";
        snap.forEach(m => {
            const d = m.val();
            const isMine = d.uid === uid;
            chatBox.innerHTML += `
                <div class="bubble-wrap ${isMine ? 'mine' : ''}">
                    <div class="sender-name">${d.user}</div>
                    <div class="bubble-text">${d.text}</div>
                </div>`;
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

window.sendMessage = () => {
    const input = document.getElementById('chat-input');
    if (!input.value.trim()) return;
    push(ref(db, `rooms/${roomId}/chat`), {
        uid: auth.currentUser.uid,
        user: myNick,
        text: input.value,
        time: serverTimestamp()
    });
    input.value = "";
    input.focus();
};

window.startGame = () => update(ref(db, `rooms/${roomId}`), { status: "playing" });

window.toggleRules = (show) => {
    document.getElementById('rules-modal').style.display = show ? 'block' : 'none';
    document.getElementById('modal-overlay').style.display = show ? 'block' : 'none';
};

document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
